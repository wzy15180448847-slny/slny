<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房屋租赁平台 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 900px;
            max-width: 95%;
            min-height: 600px;
            display: flex;
        }

        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left-panel h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .left-panel p {
            font-size: 16px;
            line-height: 1.8;
            opacity: 0.9;
        }

        .left-panel .features {
            margin-top: 40px;
        }

        .left-panel .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .left-panel .feature-item .icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 18px;
        }

        .right-panel {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-header h2 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .form-header p {
            color: #666;
            font-size: 14px;
        }

        .tab-buttons {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            font-size: 16px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn.active {
            color: #667eea;
            font-weight: bold;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #667eea;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group .input-icon {
            position: relative;
        }

        .form-group .input-icon input {
            padding-left: 40px;
        }

        .form-group .input-icon .icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .user-type-selector {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .user-type-option {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-type-option:hover {
            border-color: #667eea;
        }

        .user-type-option.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .user-type-option .icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .user-type-option .text {
            font-size: 14px;
            color: #333;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .form-footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }

        .form-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            padding: 0 15px;
            color: #999;
            font-size: 14px;
        }

        .social-login {
            display: flex;
            gap: 15px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .social-btn:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .left-panel {
                display: none;
            }

            .right-panel {
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h1>🏠 房屋租赁平台</h1>
            <p>专业的房屋租赁服务平台，为您提供安全、便捷的租房体验</p>
            
            <div class="features">
                <div class="feature-item">
                    <div class="icon">✓</div>
                    <div>海量真实房源，品质保障</div>
                </div>
                <div class="feature-item">
                    <div class="icon">✓</div>
                    <div>在线预约看房，省时省力</div>
                </div>
                <div class="feature-item">
                    <div class="icon">✓</div>
                    <div>电子合同签约，安全可靠</div>
                </div>
                <div class="feature-item">
                    <div class="icon">✓</div>
                    <div>专业售后服务，无忧租房</div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="form-header">
                <h2>欢迎回来</h2>
                <p>登录您的账户开始使用</p>
            </div>

            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('login')">登录</button>
                <button class="tab-btn" onclick="switchTab('register')">注册</button>
            </div>

            <div id="alert" class="alert"></div>

            <!-- 登录表单 -->
            <form id="loginForm" class="form-content active">
                <div class="form-group">
                    <label>用户名/手机号</label>
                    <div class="input-icon">
                        <span class="icon">👤</span>
                        <input type="text" id="loginUsername" placeholder="请输入用户名或手机号" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>密码</label>
                    <div class="input-icon">
                        <span class="icon">🔒</span>
                        <input type="password" id="loginPassword" placeholder="请输入密码" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn">登 录</button>

                <div class="form-footer">
                    <a href="forgot-password.html">忘记密码？</a>
                </div>
            </form>

            <!-- 注册表单 -->
            <form id="registerForm" class="form-content">
                <div class="form-group">
                    <label>用户类型</label>
                    <div class="user-type-selector">
                        <div class="user-type-option selected" data-type="TENANT" onclick="selectUserType(this)">
                            <div class="icon">🏠</div>
                            <div class="text">租客</div>
                        </div>
                        <div class="user-type-option" data-type="LANDLORD" onclick="selectUserType(this)">
                            <div class="icon">🏢</div>
                            <div class="text">房东</div>
                        </div>
                        <div class="user-type-option" data-type="AGENT" onclick="selectUserType(this)">
                            <div class="icon">👔</div>
                            <div class="text">中介</div>
                        </div>
                    </div>
                    <input type="hidden" id="userType" value="TENANT">
                </div>

                <div class="form-group">
                    <label>用户名</label>
                    <div class="input-icon">
                        <span class="icon">👤</span>
                        <input type="text" id="regUsername" placeholder="请输入用户名（4-20位字母数字）" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>手机号</label>
                    <div class="input-icon">
                        <span class="icon">📱</span>
                        <input type="tel" id="regPhone" placeholder="请输入手机号" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>密码</label>
                    <div class="input-icon">
                        <span class="icon">🔒</span>
                        <input type="password" id="regPassword" placeholder="请输入密码（6-20位）" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>确认密码</label>
                    <div class="input-icon">
                        <span class="icon">🔒</span>
                        <input type="password" id="regConfirmPassword" placeholder="请再次输入密码" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn">注 册</button>

                <div class="form-footer">
                    已有账户？<a href="#" onclick="switchTab('login')">立即登录</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api';

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.form-content').forEach(form => {
                form.classList.remove('active');
            });

            if (tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }

            hideAlert();
        }

        function selectUserType(element) {
            document.querySelectorAll('.user-type-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            element.classList.add('selected');
            document.getElementById('userType').value = element.dataset.type;
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert ' + type;
            alert.style.display = 'block';
        }

        function hideAlert() {
            document.getElementById('alert').style.display = 'none';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showAlert('请填写完整的登录信息', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.code === 200) {
                    localStorage.setItem('token', result.data.token);
                    localStorage.setItem('userInfo', JSON.stringify(result.data.user));
                    showAlert('登录成功！正在跳转...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showAlert(result.message || '登录失败', 'error');
                }
            } catch (error) {
                showAlert('网络错误，请稍后重试', 'error');
                console.error('Login error:', error);
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('regUsername').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const userType = document.getElementById('userType').value;

            if (!username || !phone || !password || !confirmPassword) {
                showAlert('请填写完整的注册信息', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('两次密码输入不一致', 'error');
                return;
            }

            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showAlert('请输入正确的手机号', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        username, 
                        phone, 
                        password, 
                        userType 
                    })
                });

                const result = await response.json();

                if (result.code === 200) {
                    showAlert('注册成功！请登录', 'success');
                    setTimeout(() => {
                        switchTab('login');
                    }, 1500);
                } else {
                    showAlert(result.message || '注册失败', 'error');
                }
            } catch (error) {
                showAlert('网络错误，请稍后重试', 'error');
                console.error('Register error:', error);
            }
        });
    </script>
</body>
</html>
