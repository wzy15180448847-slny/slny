server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

spring:
  application:
    name: house-rental-platform

  profiles:
    active: dev

  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/house_rental?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.bmp,*.png,*.css,*.ico,/druid/*"
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false
        login-username: admin
        login-password: admin

  # MyBatis Plus配置
  mybatis-plus:
    mapper-locations: classpath*:mapper/**/*.xml
    type-aliases-package: com.houserental.entity
    configuration:
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
      map-underscore-to-camel-case: true

  # Redis配置 (本地开发环境开箱即用配置)
  # 启动Redis: docker run -p 6379:6379 redis:6.2
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: 6000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    connection-timeout: 60000
    requested-heartbeat: 30
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-interval: 10000ms
        multiplier: 2.0
        max-attempts: 3
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: 5
        max-concurrency: 10
        retry:
          enabled: true
          initial-interval: 1000ms
          max-interval: 10000ms
          multiplier: 2.0
          max-attempts: 3

  # 邮件发送配置
  mail:
    host: smtp.qq.com
    port: 587
    username: your-email@qq.com
    password: your-email-password
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# 日志配置
logging:
  level:
    root: INFO
    com.houserental: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: log/house-rental.log
    max-size: 10MB
    max-history: 30

# 自定义配置
app:
  # JWT配置
  jwt:
    secret: ${APP_JWT_SECRET:house-rental-platform-secret-key-2024-secure-jwt-token}
    expiration: ${APP_JWT_EXPIRATION:86400000}
    refresh-expiration: ${APP_JWT_REFRESH_EXPIRATION:604800000}
    header: Authorization
    prefix: Bearer

  # 文件存储配置
  file:
    upload-path: ./uploads
    allowed-types: jpg,jpeg,png,gif,pdf,doc,docx
    max-size: 10485760

  # MinIO配置 (本地开发环境开箱即用配置)
  # 启动MinIO: docker run -p 9000:9000 -p 9001:9001 minio/minio server /data --console-address ":9001"
  minio:
    url: ${APP_MINIO_URL:http://localhost:9000}
    access-key: ${APP_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${APP_MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${APP_MINIO_BUCKET_NAME:house-rental}
    secure: ${APP_MINIO_SECURE:false}

  # Elasticsearch配置
  elasticsearch:
    enabled: ${APP_ELASTICSEARCH_ENABLED:false}
    uris: ${APP_ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${APP_ELASTICSEARCH_USERNAME:elastic}
    password: ${APP_ELASTICSEARCH_PASSWORD:changeme}
    socket-timeout: 30s
    connection-timeout: 10s

  # 短信配置（模拟模式）
  sms:
    enabled: ${APP_SMS_ENABLED:false}
    sign-name: ${APP_SMS_SIGN_NAME:房屋租赁平台}



# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
    enableSwaggerModels: true
    enableDocumentManage: true
  documents:
    - group: 默认分组
      name: 房屋租赁平台API文档
      locations: classpath:markdown/*

# Springfox配置
springfox:
  documentation:
    enabled: false
